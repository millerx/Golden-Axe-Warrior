<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Axe Warrior</title>
  <meta name="description" content="Grid of 15x15 images with coordinate badges">
  <style>
    body {
      color: #fff;
      background-color: #000;
      padding: 1rem;
      font-family: Arial, Helvetica, sans-serif;
    }

    p {
      margin-bottom: 8px;
      padding-bottom: 4px;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(15, 128px);
      gap: 0;
      width: fit-content;
      margin: 0 auto;
      padding-right: 6rem;
      position: relative;
    }

    .grid-item {
      width: 128px;
      height: 80px;
      position: relative;
    }

    .grid-item img {
      width: 128px;
      height: 80px;
    }

    .coordinate-badge {
      position: absolute;
      top: 2px;
      left: 2px;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 2px 6px;
      font-size: 10px;
      font-weight: bold;
      color: #333;
      text-decoration: none;
      border-radius: 2px;
      cursor: default;
      display: inline-block;
    }

    .coordinate-badge:hover {
      background-color: rgba(255, 255, 255, 0.9);
    }

    .coordinate-badge:focus {
      outline: 2px solid rgba(255,255,255,0.6);
    }

    .coordinate-badge .tooltip {
      display: none;
      position: absolute;
      top: 110%;
      left: 0;
      margin-top: 6px;
      background-color: rgba(0, 0, 0, 0.95);
      color: #fff;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 4px;
      white-space: pre-wrap;
      min-width: 30ch;
      max-width: 80ch;
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
      z-index: 20;
    }

    .coordinate-badge:hover .tooltip,
    .coordinate-badge:focus .tooltip {
      display: block;
    }

    .coordinate-headers {
      margin-top: 40px;
      padding: 20px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .coordinate-header {
      margin-top: 20px;
      padding-top: 10px;
      font-weight: bold;
    }

    .coordinate-notes p {
      white-space: pre-wrap;
    }

    .tunnel-overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <h1 class="page-title">Golden Axe Warrior</h1>
  <p>The game starts at screen 9,6</p>
  <input type="checkbox" id="showTunnels"> <label for="showTunnels">Show tunnels</label>

  <div class="grid-container">
    <!-- Grid will be populated by JavaScript -->
  </div>

  <div class="coordinate-headers" id="coordinateHeaders">
    <!-- Headers and notes will be generated dynamically -->
  </div>

  <!-- Load notes JSON structure from this script into window.COORD_NOTES -->
  <script src="notes.js"></script>

  <script>
    const gridContainer = document.querySelector('.grid-container');
    const gridSize = 15;
    const coordSeperator = ',';

    if (!window.COORD_NOTES) {
      console.warn('No window.COORD_NOTES found.');
    }
    const notesData = window.COORD_NOTES || {};

    // Generate the grid
    for (let row = 1; row <= gridSize; row++) {
      for (let col = 1; col <= gridSize; col++) {
        const coordinate = `${row},${col}`;
        const anchorId = `coord-${row}-${col}`;

        // Create grid item
        const gridItem = document.createElement('div');
        gridItem.className = 'grid-item';

        // Create image
        const img = document.createElement('img');
        img.src = `imgs/${row}_${col}.png`;
        img.loading = 'lazy';

        // Create coordinate badge as a non-navigating element with tooltip
        const badge = document.createElement('span');
        badge.className = 'coordinate-badge';
        badge.tabIndex = 0;
        badge.textContent = coordinate;

        const noteText = notesData[coordinate];
        if (noteText) {
          const tooltip = document.createElement('div');
          tooltip.className = 'tooltip';
          tooltip.textContent = `${coordinate}: ${noteText}`;
          badge.appendChild(tooltip);
        }

        gridItem.appendChild(img);
        gridItem.appendChild(badge);
        gridContainer.appendChild(gridItem);
      }
    }

    // Create and append the tunnel overlay
    const tunnelOverlay = document.createElement('div');
    tunnelOverlay.className = 'tunnel-overlay';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', gridContainer.clientWidth);
    svg.setAttribute('height', gridContainer.clientHeight);
    svg.setAttribute('viewBox', `0 0 ${gridContainer.clientWidth} ${gridContainer.clientHeight}`);
    tunnelOverlay.appendChild(svg);
    gridContainer.appendChild(tunnelOverlay);

    // Initially hide the tunnel overlay
    tunnelOverlay.style.display = 'none';

    // Add event listener to checkbox
    const checkbox = document.getElementById('showTunnels');
    checkbox.addEventListener('change', () => {
      tunnelOverlay.style.display = checkbox.checked ? 'block' : 'none';
    });

    // Position the tunnel lines dynamically
    if (!window.TUNNELS) {
      console.warn('No window.TUNNELS found.');
    } else {
      Object.entries(window.TUNNELS).forEach(([from, to]) => {
        const [fromRow, fromCol] = from.split(coordSeperator).map(Number);
        const [toRow, toCol] = to.split(coordSeperator).map(Number);
        const fromIndex = (fromRow - 1) * 15 + (fromCol - 1);
        const toIndex = (toRow - 1) * 15 + (toCol - 1);
        const item1 = gridContainer.children[fromIndex];
        const item2 = gridContainer.children[toIndex];
        if (item1 && item2) {
          const rect1 = item1.getBoundingClientRect();
          const rect2 = item2.getBoundingClientRect();
          const containerRect = gridContainer.getBoundingClientRect();
          const x1 = rect1.left + rect1.width / 2 - containerRect.left;
          const y1 = rect1.top + rect1.height / 2 - containerRect.top;
          const x2 = rect2.left + rect2.width / 2 - containerRect.left;
          const y2 = rect2.top + rect2.height / 2 - containerRect.top;

          const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line1.setAttribute('x1', x1);
          line1.setAttribute('y1', y1);
          line1.setAttribute('x2', x2);
          line1.setAttribute('y2', y2);
          line1.setAttribute('stroke', 'black');
          line1.setAttribute('stroke-width', '6');
          line2.setAttribute('x1', x1);
          line2.setAttribute('y1', y1);
          line2.setAttribute('x2', x2);
          line2.setAttribute('y2', y2);
          line2.setAttribute('stroke', 'yellow');
          line2.setAttribute('stroke-width', '2');
          svg.appendChild(line1);
          svg.appendChild(line2);
        }
      });
    }
  </script>
</body>

</html>
