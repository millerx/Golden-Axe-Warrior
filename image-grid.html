<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Axe Warrior</title>
  <meta name="description" content="Grid of 15x15 images with coordinate badges">
  <style>
    body {
      color: #fff;
      background-color: #000;
      padding: 1rem;
      font-family: Arial, Helvetica, sans-serif;
    }

    p {
      margin-bottom: 8px;
      padding-bottom: 4px;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(15, 128px);
      gap: 0;
      width: fit-content;
      margin: 0 auto;
      padding-right: 6rem;
      position: relative;
    }

    .grid-item {
      width: 128px;
      height: 80px;
      position: relative;
    }

    .grid-item img {
      width: 128px;
      height: 80px;
    }

    .coordinate-badge {
      position: absolute;
      top: 2px;
      left: 2px;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 2px 6px;
      font-size: 10px;
      font-weight: bold;
      color: #333;
      text-decoration: none;
      border-radius: 2px;
      cursor: default;
      display: inline-block;
    }

    .coordinate-badge:hover {
      background-color: rgba(255, 255, 255, 0.9);
    }

    .coordinate-badge:focus {
      outline: 2px solid rgba(255,255,255,0.6);
    }

    .coordinate-badge .tooltip {
      display: none;
      position: absolute;
      top: 110%;
      left: 0;
      margin-top: 6px;
      background-color: rgba(0, 0, 0, 0.95);
      color: #fff;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 4px;
      white-space: pre-wrap;
      min-width: 30ch;
      max-width: 80ch;
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
      z-index: 20;
    }

    .coordinate-badge:hover .tooltip,
    .coordinate-badge:focus .tooltip {
      display: block;
    }

    .coordinate-headers {
      margin-top: 40px;
      padding: 20px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .coordinate-header {
      margin-top: 20px;
      padding-top: 10px;
      font-weight: bold;
    }

    .coordinate-notes p {
      white-space: pre-wrap;
    }

    .tunnel-overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>

<body>
  <h1 class="page-title">Golden Axe Warrior</h1>
  <p>The game starts at screen 9,F</p>
  <input type="checkbox" id="showTunnels"> <label for="showTunnels">Show tunnels</label>

  <div class="grid-container">
    <!-- Grid will be populated by JavaScript -->
    <div class="tunnel-overlay"><svg></svg></div>
  </div>

  <div class="coordinate-headers" id="coordinateHeaders">
    <!-- Headers and notes will be generated dynamically -->
  </div>

  <!-- Load notes JSON structure from this script into window.COORD_NOTES -->
  <script src="notes.js"></script>

  <script>
    const gridContainer = document.querySelector('.grid-container');
    const gridSize = 15;
    const coordSeperator = ',';

    if (!window.COORD_NOTES) console.warn('No window.COORD_NOTES found.');
    const notesData = window.COORD_NOTES || {};

    // Generate the grid
    for (let row = 1; row <= gridSize; row++) {
      for (let colCode = 65; colCode < 65 + gridSize; colCode++) {
        const col = String.fromCharCode(colCode);
        const coordinate = `${row}${coordSeperator}${col}`;

        // Create grid item
        const gridItem = document.createElement('div');
        gridItem.className = 'grid-item';
        gridItem.setAttribute('data-coord', `${row}_${col}`);

        // Create image
        const img = document.createElement('img');
        img.src = `imgs/${row}_${col}.png`;
        img.loading = 'lazy';

        // Create coordinate badge as a non-navigating element with tooltip
        const badge = document.createElement('span');
        badge.className = 'coordinate-badge';
        badge.tabIndex = 0;
        badge.textContent = coordinate;

        const noteText = notesData[coordinate];
        if (noteText) {
          const tooltip = document.createElement('div');
          tooltip.className = 'tooltip';
          tooltip.textContent = `${coordinate}: ${noteText}`;
          badge.appendChild(tooltip);
        }

        gridItem.appendChild(img);
        gridItem.appendChild(badge);
        gridContainer.appendChild(gridItem);
      }
    }

    // Get the tunnel overlay
    const tunnelOverlay = document.querySelector('.tunnel-overlay');
    const svg = tunnelOverlay.querySelector('svg');
    svg.setAttribute('width', gridContainer.clientWidth);
    svg.setAttribute('height', gridContainer.clientHeight);
    svg.setAttribute('viewBox', `0 0 ${gridContainer.clientWidth} ${gridContainer.clientHeight}`);

    // Initially hide the tunnel overlay
    tunnelOverlay.style.display = 'none';

    // Add event listener to checkbox
    const checkbox = document.getElementById('showTunnels');
    checkbox.addEventListener('change', () => {
      tunnelOverlay.style.display = checkbox.checked ? 'block' : 'none';
    });

    // Helper function to get center coordinates of an item relative to container
    function getCenter(item, containerRect) {
      const rect = item.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2 - containerRect.left,
        y: rect.top + rect.height / 2 - containerRect.top
      };
    }

    // Helper function to create and configure tunnel line element
    function createTunnelLine(point1, point2, stroke, strokeWidth) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', point1.x);
      line.setAttribute('y1', point1.y);
      line.setAttribute('x2', point2.x);
      line.setAttribute('y2', point2.y);
      line.setAttribute('stroke', stroke);
      line.setAttribute('stroke-width', strokeWidth);
      return line;
    }

    // Position the tunnel lines dynamically
    if (!window.TUNNELS) console.warn('No window.TUNNELS found.');
    const tunnelsData = window.TUNNELS || {};
    const containerRect = gridContainer.getBoundingClientRect();

    Object.entries(tunnelsData).forEach(([from, to]) => {
      const [fromRow, fromCol] = from.split(coordSeperator);
      const [toRow, toCol] = to.split(coordSeperator);
      const item1 = gridContainer.querySelector(`[data-coord="${fromRow}_${fromCol}"]`);
      const item2 = gridContainer.querySelector(`[data-coord="${toRow}_${toCol}"]`);
      if (!item1) console.warn(`Failed to find tunnel start at ${fromRow}_${fromCol}`);
      else if (!item2) console.warn(`Failed to find tunnel end at ${toRow}_${toCol}`);
      else {
        const center1 = getCenter(item1, containerRect);
        const center2 = getCenter(item2, containerRect);

        svg.appendChild(createTunnelLine(center1, center2, 'black', '6'));
        svg.appendChild(createTunnelLine(center1, center2, 'yellow', '2'));
      }
    });
  </script>
</body>

</html>
