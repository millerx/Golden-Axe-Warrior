<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Axe Warrior</title>
  <meta name="description" content="Grid of 15x15 images with coordinate links">
  <style>
    body {
      color: #fff;
      background-color: #000;
      padding: 1rem;
      font-family: Arial, Helvetica, sans-serif;
    }

    p {
      margin-bottom: 8px;
      padding-bottom: 4px;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      gap: 0;
      width: 100%;
      margin: 0 auto;
    }

    .grid-item {
      width: 100%;
      height: 80px;
      aspect-ratio: 1;
      position: relative;
    }

    .grid-item img {
      width: 128px;
      height: 80px;
    }

    .coordinate-link {
      position: absolute;
      top: 2px;
      left: 2px;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 2px 4px;
      font-size: 10px;
      font-weight: bold;
      color: #333;
      text-decoration: none;
      border-radius: 2px;
    }

    .coordinate-link:hover {
      background-color: rgba(255, 255, 255, 0.9);
    }

    .coordinate-headers {
      margin-top: 40px;
      padding: 20px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .coordinate-header {
      margin-top: 20px;
      padding-top: 10px;
      font-weight: bold;
    }

    .coordinate-notes p {
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1 class="page-title">Golden Axe Warrior</h1>

  <div class="grid-container">
    <!-- Grid will be populated by JavaScript -->
  </div>

  <div class="coordinate-headers" id="coordinateHeaders">
    <!-- Headers and notes will be generated dynamically -->
  </div>

  <script src="notes.js"></script>

  <script>
    const gridContainer = document.querySelector('.grid-container');
    const gridSize = 15;

    // Generate the grid
    for (let row = 1; row <= gridSize; row++) {
      for (let col = 1; col <= gridSize; col++) {
        const coordinate = `${row}x${col}`;
        const anchorId = `coord-${row}-${col}`;

        // Create grid item
        const gridItem = document.createElement('div');
        gridItem.className = 'grid-item';

        // Create image
        const img = document.createElement('img');
        img.src = `imgs/${row}_${col}.png`;
        img.loading = 'lazy';

        // Create coordinate link
        const link = document.createElement('a');
        link.href = `#${anchorId}`;
        link.className = 'coordinate-link';
        link.textContent = coordinate;

        gridItem.appendChild(img);
        gridItem.appendChild(link);
        gridContainer.appendChild(gridItem);
      }
    }

    // Initialize coordinate headers and populate notes from `window.COORD_NOTES`
    (function initCoordinateHeadersAndNotes() {
      const headersContainer = document.getElementById('coordinateHeaders');

      // Create headers and empty notes containers for all coordinates
      for (let row = 1; row <= gridSize; row++) {
        for (let col = 1; col <= gridSize; col++) {
          const anchorId = `coord-${row}-${col}`;
          if (!document.getElementById(anchorId)) {
            const h3 = document.createElement('h3');
            h3.id = anchorId;
            h3.className = 'coordinate-header';
            h3.textContent = `Coordinate ${row}x${col}`;
            headersContainer.appendChild(h3);
          }

          const notesId = `notes-${row}-${col}`;
          if (!document.getElementById(notesId)) {
            const notesDiv = document.createElement('div');
            notesDiv.id = notesId;
            notesDiv.className = 'coordinate-notes';
            headersContainer.appendChild(notesDiv);
          }
        }
      }

      // Populate notes from provided data (if any)
      const data = window.COORD_NOTES;
      if (!data || typeof data !== 'object') {
        console.warn('No window.COORD_NOTES found; skipping notes population.');
        return;
      }

      Object.entries(data).forEach(([key, notes]) => {
        if (!notes) return;
        const coords = String(key).match(/^(\d+)x(\d+)$/);
        if (!coords) return;
        const containerId = `notes-${coords[1]}-${coords[2]}`;
        let container = document.getElementById(containerId);
        if (!container) {
          container = document.createElement('div');
          container.id = containerId;
          container.className = 'coordinate-notes';
          headersContainer.appendChild(container);
        }

        // clear existing and append note paragraph
        container.innerHTML = '';
        const fragment = document.createDocumentFragment();
        const p = document.createElement('p');
        p.textContent = String(notes);
        fragment.appendChild(p);
        container.appendChild(fragment);
      });
    })();
  </script>
</body>

</html>
