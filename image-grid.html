<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Axe Warrior</title>
  <meta name="description" content="Grid of 15x15 images with coordinate badges">
  <style>
    body {
      color: #fff;
      background-color: #000;
      padding: 1rem;
      font-family: Arial, Helvetica, sans-serif;
    }

    p {
      margin-bottom: 8px;
      padding-bottom: 4px;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(15, 128px);
      gap: 0;
      width: fit-content;
      margin: 0 auto;
      padding-right: 6rem;
      position: relative;
    }

    .grid-item {
      width: 128px;
      height: 80px;
      position: relative;
    }

    .grid-item img {
      width: 128px;
      height: 80px;
    }

    .coordinate-badge {
      position: absolute;
      top: 2px;
      left: 2px;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 2px 6px;
      font-size: 10px;
      font-weight: bold;
      color: #333;
      text-decoration: none;
      border-radius: 2px;
      cursor: default;
      display: inline-block;
    }

    .coordinate-badge:hover {
      background-color: rgba(255, 255, 255, 0.9);
    }

    .coordinate-badge:focus {
      outline: 2px solid rgba(255,255,255,0.6);
    }

    .coordinate-badge .tooltip {
      display: none;
      position: absolute;
      top: 110%;
      left: 0;
      margin-top: 6px;
      background-color: rgba(0, 0, 0, 0.95);
      color: #fff;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 4px;
      white-space: pre-wrap;
      min-width: 30ch;
      max-width: 80ch;
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
      z-index: 20;
    }

    .coordinate-badge:hover .tooltip,
    .coordinate-badge:focus .tooltip {
      display: block;
    }

    .coordinate-headers {
      margin-top: 40px;
      padding: 20px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .coordinate-header {
      margin-top: 20px;
      padding-top: 10px;
      font-weight: bold;
    }

    .coordinate-notes p {
      white-space: pre-wrap;
    }

    .tunnel-overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>

<body>
  <h1 class="page-title">Golden Axe Warrior</h1>
  <p>The game starts at screen 9,F</p>
  <input type="checkbox" id="showTunnels"> <label for="showTunnels">Show tunnels</label>

  <div class="grid-container">
    <!-- Grid will be populated by JavaScript -->
    <div class="tunnel-overlay"><svg></svg></div>
  </div>

  <div class="coordinate-headers" id="coordinateHeaders">
    <!-- Headers and notes will be generated dynamically -->
  </div>

  <!-- Load notes JSON structure from this script into window.COORD_NOTES -->
  <script src="notes.js"></script>
  <script src="image-grid.js"></script>
</body>

</html>
